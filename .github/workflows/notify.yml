name: Free Games Notifier

on:
  schedule:
    - cron: '0 16 * * *'  # ทุกวัน 23:00 น. เวลาไทย
  workflow_dispatch:        # กดรันมือได้จาก GitHub

permissions:
  contents: write

jobs:
  notify: 
    runs-on: ubuntu-latest
    concurrency:
      group: free-games-notifier
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_ONCE: '1'
        run: python notify.py

      - name: Commit notified/status files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notified.json status.json || true
          git commit -m "Update notified/status files" || echo "No changes to commit"
          git push origin HEAD:main
        shell: bash
